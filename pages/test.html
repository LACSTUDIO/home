<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载页面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section id="download" class="download-section">
        <div class="section-container">
            <h2 class="section-title">下载</h2>
            <div class="download-info">
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-code-branch"></i></div>
                    <h3>当前版本</h3>
                    <p id="app-latest-version">加载中...</p>
                </div>
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
                    <h3>发布日期</h3>
                    <p id="app-release-date">加载中...</p>
                </div>
                <div class="info-card">
                    <div class="info-icon"><i class="fas fa-bell"></i></div>
                    <h3>公告</h3>
                    <p id="app-notice">加载中...</p>
                </div>
            </div>
            <div class="download-actions">
                <a id="download-link" href="#" class="download-button" data-umami-event="下载软件" onclick="openLink(this.getAttribute('data-url')); return false;">
                    <i class="fab fa-windows"></i> Windows 版本
                </a>
                <a id="history-link" href="#" class="history-button">
                    <i class="fas fa-history"></i> 历史版本
                </a>
            </div>
        </div>
    </section>

    <div id="version-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>历史版本</h2>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        async function initVersionInfo() {
            try {
                const response = await fetch('https://api.xn--5brr03o.top/hout.json');
                const data = await response.json();

                // 更新版本信息
                document.getElementById('app-latest-version').textContent = data.latest_version;
                document.getElementById('app-release-date').textContent = data.release_date;
                document.getElementById('app-notice').textContent = data.notice.content;

                // 设置下载链接
                const downloadLink = document.getElementById('download-link');
                downloadLink.setAttribute('data-url', data.download_links.windows.url);
                downloadLink.href = data.download_links.windows.url;

                // 初始化历史版本模态框
                const modal = document.getElementById('version-modal');
                const closeBtn = modal.querySelector('.close');
                const historyLink = document.getElementById('history-link');

                historyLink.addEventListener('click', () => {
                    updateVersionModalContent(data);
                    modal.style.display = 'flex';
                });

                closeBtn.addEventListener('click', () => {
                    modal.style.display = 'none';
                });

                window.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.style.display = 'none';
                    }
                });

            } catch (error) {
                console.error('获取版本信息失败:', error);
                document.getElementById('app-latest-version').textContent = '获取失败';
                document.getElementById('app-release-date').textContent = '获取失败';
                document.getElementById('app-notice').textContent = '获取公告失败';
            }
        }

        function openLink(url) {
            if (url) {
                window.open(url, '_blank');
            } else {
                console.error('下载链接未设置');
            }
        }

        function updateVersionModalContent(data) {
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = ''; // 清空模态框内容
            data.previous_versions.forEach(version => {
                modalContent.innerHTML += `<div class="version-item">
                    <h4>版本: ${version.version}</h4>
                    <p>发布日期: ${version.release_date}</p>
                    <p>内容: ${version.content}</p>
                    <hr> <!-- 添加分隔线以便更清晰地分隔不同版本 -->
                </div>`;
            });
        }

        // 调用initVersionInfo函数以初始化版本信息
        document.addEventListener('DOMContentLoaded', initVersionInfo);
    </script>
</body>
</html>
