<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>解析JSON数据</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .store-list, .water-list {
            margin-bottom: 20px;
        }
        .store-list h2, .water-list h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        // 使用fetch API获取JSON数据
        fetch('https://api.xn--5brr03o.top/test/test.json')
            .then(response => response.json()) // 将响应转换为JSON格式
            .then(data => {
                // 创建一个容器用于展示数据
                const content = document.getElementById('content');

                // 显示notice信息
                const noticeDiv = document.createElement('div');
                noticeDiv.textContent = `公告: ${data.notice}`;
                content.appendChild(noticeDiv);

                // 显示second部分的stores和waters
                displaySection(content, data.second, 'second');

                // 显示third部分的stores和waters
                displaySection(content, data.third, 'third');
            })
            .catch(error => console.error('Error fetching the JSON data:', error));

        // 定义一个函数来显示每个section的数据
        function displaySection(parent, sectionData, sectionName) {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'store-list';

            const storesHeader = document.createElement('h2');
            storesHeader.textContent = `Section ${sectionName} - 商店`;
            sectionDiv.appendChild(storesHeader);

            const storesList = document.createElement('ul');
            sectionData.stores.forEach(store => {
                const storeItem = document.createElement('li');
                storeItem.textContent = store;
                storesList.appendChild(storeItem);
            });
            sectionDiv.appendChild(storesList);

            const watersHeader = document.createElement('h2');
            watersHeader.textContent = `Section ${sectionName} - 饮品`;
            sectionDiv.appendChild(watersHeader);

            const watersList = document.createElement('ul');
            sectionData.waters.forEach(water => {
                const waterItem = document.createElement('li');
                waterItem.textContent = water;
                watersList.appendChild(waterItem);
            });
            sectionDiv.appendChild(watersList);

            parent.appendChild(sectionDiv);
        }
    </script>
</body>
</html>
