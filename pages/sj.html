<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>随机选择</title>
    <style>
    body {
        font-family: 'Microsoft YaHei', Arial, sans-serif;
        background: linear-gradient(135deg, #dfe9f3, #c3d2e0);
        text-align: center;
        padding: 0;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow-x: hidden;
    }

    .container-background {
        height: 100%;
        overflow: hidden;
        position: relative;
        margin: 10px;
        padding: 5px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .container {
        background-color: #ffffff;
        border-radius: 18px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 80%;
        margin: 15px 10px;
        max-width: 800px;

    }

    button {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        padding: 15px 30px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        transition: background 0.3s ease, transform 0.2s ease;
        min-height: 50px;
        pointer-events: none;
        opacity: 0.6;
    }

    button.enabled {
        pointer-events: auto;
        opacity: 1;
        transform: scale(1.05);
    }

    button:hover {
        background: linear-gradient(135deg, #2575fc, #6a11cb);
    }

    p {
        font-size: 22px;
        margin-top: 20px;
        color: #333;
        transition: color 0.3s ease;
    }

    p:hover {
        color: #6a11cb;
    }

    .button-container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 添加媒体查询以适应小屏幕 */
    @media screen and (max-width: 600px) {
        .container-background {
            width: 90%;
            margin: 10px auto;
        }

        .container {
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        p {
            font-size: 18px;
        }
    }

    #floorSelect {
        padding: 10px;
        border-radius: 10px;
        border: 2px solid #2575fc;
        background-color: #ffffff;
        font-size: 16px;
        color: #333;
        cursor: pointer;
        transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        margin-bottom: 15px;
    }

    #floorSelect:hover {
        border-color: #6a11cb;
        box-shadow: 0 0 12px rgba(0, 123, 255, 0.4);
        background: rgba(255, 255, 255, 0.9);
    }

    #floorSelect:focus {
        outline: none;
        border-color: #004099;
        box-shadow: 0 0 14px rgba(0, 86, 179, 0.5);
        background: rgba(255, 255, 255, 1);
    }
</style>
</head>
<body>
<div class="container-background">
    <div class="container">
        <span>
            <p id="selectionResult-a">公告-Content:</p>
            <p id="adContentText">test</p>
        </span>
    </div>
    <div class="container">
        <p id="log_text"></p>
    </div>
    <div class="container">
        <h1>随机选择</h1>
        <div class="button-container">
            <label for="floorSelect">楼层选择:</label>
            <select id="floorSelect" onchange="handleFloorSelect(this.value)">
                <option value="random">随机</option>
                <option value="2">2层</option>
                <option value="3">3层</option>
                <!-- 可以在这里添加更多楼层选项 -->
            </select>
            <button id="storeButton" onclick="selectRandomStore()">随机店家</button>
            <button id="cafeButton" onclick="selectCafe()">随机饮品</button>
        </div>
    </div>
    <div class="container">
        <p id="selectionResult"></p>
    </div>



</div>
<footer>
<span><p>© 2025 <a href="https://www.xn--5brr03o.top/">LAC Studio</a> and <a href="https://blog.ssxaya.fun/">ssxaya</a></span>
</footer>
<script>
    let data = {
        2: { stores: [], waters: [] },
        3: { stores: [], waters: [] }
    };
    let selectedFloor = 'random'; // 默认选随机楼层

    // 从API获取数据并更新stores和cafes数组
    function fetchDataAndUpdateStores() {
    fetch('https://api.xn--5brr03o.top/test/test.json')
        .then(response => response.json())
        .then(data => {
            // 存储分楼层数据
            data.floors.forEach(floorObj => {
                const floorNumber = floorObj.floor;
                if (!data[floorNumber]) {
                    data[floorNumber] = {}; // 初始化楼层对象
                }
                data[floorNumber].stores = floorObj.stores;
                data[floorNumber].waters = floorObj.waters;
            });
            console.log('数据加载完成:', data);

            // 数据加载完成后启用按钮
            document.getElementById('storeButton').classList.add('enabled');
            document.getElementById('cafeButton').classList.add('enabled');

            // 输出加载的日志到log_text
            document.getElementById('log_text').innerText = '商家数据已更新 ' + '饮品数据已更新';

            // 假设API返回的数据格式为 {"notice": "目前正在测试中", ...}
            document.getElementById('adContentText').innerText = data.notice;
        })
        .catch(error => {
            console.error('获取数据时出错:', error);
            // 数据加载失败后可以显示错误信息或者启用按钮，这里选择启用按钮
            document.getElementById('storeButton').classList.add('enabled');
            document.getElementById('cafeButton').classList.add('enabled');

            // 输出错误信息到log_text
            document.getElementById('log_text').innerText = '获取数据时出错: ' + error.message;

            // 清空adContentText以避免显示不正确的信息
            document.getElementById('adContentText').innerText = '';
        });
}


    // 页面加载时调用fetchDataAndUpdateStores函数
    window.onload = fetchDataAndUpdateStores;

    // 新增楼层选择处理函数
    function handleFloorSelect(value) {
        selectedFloor = value;
    }

    // 修改随机店家选择逻辑
    function selectRandomStore() {
        let selectedStores;
        if (selectedFloor === 'random') {
            const floors = ['2', '3'];
            const randomFloor = floors[Math.floor(Math.random() * floors.length)];
            selectedStores = data[randomFloor].stores;
        } else {
            selectedStores = data[selectedFloor].stores;
        }
        if (selectedStores.length === 0) {
            document.getElementById("selectionResult").innerText = "商家数据加载中...";
            return;
        }
        const randomIndex = Math.floor(Math.random() * selectedStores.length);
        document.getElementById("selectionResult").innerText = "您选择了: " + selectedStores[randomIndex];
    }

    // 修改随机饮品选择逻辑
    function selectCafe() {
        let selectedWaters;
        if (selectedFloor === 'random') {
            const floors = ['2', '3'];
            const randomFloor = floors[Math.floor(Math.random() * floors.length)];
            selectedWaters = data[randomFloor].waters;
        } else {
            selectedWaters = data[selectedFloor].waters;
        }
        if (selectedWaters.length === 0) {
            document.getElementById("selectionResult").innerText = "饮品数据加载中...";
            return;
        }
        const randomIndex = Math.floor(Math.random() * selectedWaters.length);
        document.getElementById("selectionResult").innerText = "您选择了: " + selectedWaters[randomIndex];
    }

</script>

</body>
</html>
