<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>随机选择</title>
    <style>
    body {
        font-family: 'Microsoft YaHei', Arial, sans-serif;
        background: linear-gradient(135deg, #dfe9f3, #c3d2e0);
        text-align: center;
        padding: 0;
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow-x: hidden;
    }

    .container-background {
        height: 100%;
        overflow: auto; /* 或者使用 overflow: scroll; */
        position: relative;
        margin: 10px;
        padding: 5px;
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        align-items: center;
    }


    .container {
        background-color: #ffffff;
        border-radius: 18px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 80%;
        margin: 15px 10px;
        max-width: 800px;

    }
    .container-big {
        background-color: #ffffff;
        border-radius: 18px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 80%;
        margin: 15px 10px;
        max-width: 800px;
        height: 150px;

    }

    button {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        color: white;
        padding: 15px 30px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        transition: background 0.3s ease, transform 0.2s ease;
        min-height: 50px;
        pointer-events: none;
        opacity: 0.6;
    }

    button.enabled {
        pointer-events: auto;
        opacity: 1;
        transform: scale(1.05);
    }

    button:hover {
        background: linear-gradient(135deg, #2575fc, #6a11cb);
    }

    p {
        font-size: 22px;
        margin-top: 20px;
        color: #333;
        transition: color 0.3s ease;
    }

    p:hover {
        color: #6a11cb;
    }

    .button-container {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 添加媒体查询以适应小屏幕 */
    @media screen and (max-width: 600px) {
        .container-background {
            width: 90%;
            margin: 10px auto;
        }

        .container {
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }

        p {
            font-size: 18px;
        }
    }

    #floorSelect {
        padding: 10px;
        border-radius: 10px;
        border: 2px solid #2575fc;
        background-color: #ffffff;
        font-size: 16px;
        color: #333;
        cursor: pointer;
        transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        margin-bottom: 15px;
    }

    #floorSelect:hover {
        border-color: #6a11cb;
        box-shadow: 0 0 12px rgba(0, 123, 255, 0.4);
        background: rgba(255, 255, 255, 0.9);
    }

    #floorSelect:focus {
        outline: none;
        border-color: #004099;
        box-shadow: 0 0 14px rgba(0, 86, 179, 0.5);
        background: rgba(255, 255, 255, 1);
    }
    .settings-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        display : none;
    }
    .settings-content {
        background-color: #ffffff;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80%;
        max-width: 600px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
</style>
</head>
<body>
<div class="container-background">
    <div class="container">
        <span>
            <p id="selectionResult-a" style="display: inline-block; margin: 0;">公告-Content:</p>
            <p id="adContentText" style="display: inline-block; margin: 0;">test</p>
        </span>
    </div>
    <div class="container">
        <h1>随机选择</h1>
        <div class="button-container">
            <div>
                <label for="floorSelect">楼层选择:</label>
                <select id="floorSelect" onchange="handleFloorSelect(this.value)">
                    <option value="random">随机</option>
                    <option value="2">2层</option>
                    <option value="3">3层</option>
                </select>
            </div>

            <div >
                <button id="storeButton" onclick="selectRandomStore()">随机店家</button>
                <button id="cafeButton" onclick="selectWater()">随机饮品</button>
            </div>
        </div>
    </div>
    <div class="container">
        <p id="selectionResult"></p>
    </div>
    <div class="container-big">
        <h1>Log</h1>
        <p id="log_text">正在获取数据...</p>
    </div>

</div>
<div class="settings-container">
    <div class="settings-content">
        <a href="#" onclick="settings()">关闭</a>
        <div class="settings-header">
            <h1>设置</h1>
        </div>
        <div class="settings-body">
            <h2>网站整体逻辑</h2>
            <p>本站的主要逻辑是随机选择一个楼层的店家和饮品，并展示给用户。用户可以选择楼层，也可以随机选择。本站的主要数据来源是通过接口获取的，接口地址为https://api.xn--5brr03o.top/test/test.json，数据格式为json。</p>
            <p>用户操作的流程是：选择楼层，点击随机店家或随机饮品按钮，页面展示随机选择的店家或饮品。</p>
        </div>
    </div>
</div>
<footer>
<span><p>© 2025 <a href="https://www.xn--5brr03o.top/">LAC Studio</a> and <a href="https://blog.ssxaya.fun/">ssxaya</a></span>
<a href="#" onclick="settings()">关于本站</a>
</footer>
<script>
    let data = {
        2: { stores: [], waters: [] },
        3: { stores: [], waters: [] },
        notice: 'test'
    };

    let selectedFloor = 'random';
    let isLoading = true;

    // 通用数据加载函数
    async function fetchData() {
        try {
            const response = await fetch('https://api.xn--5brr03o.top/test/test.json');
            if (!response.ok) throw new Error('网络响应不正常: ' + response.statusText);
            return await response.json();
        } catch (error) {
            throw error;
        }
    }

    // 更新数据并启用按钮
    function updateDataAndUI(apiData) {
        ['2', '3'].forEach(floor => {
            const floorKey = floor === '2' ? 'second' : 'third'; // 根据楼层选择正确的键名
            data[floor].stores = apiData[floorKey]?.stores || [];
            data[floor].waters = apiData[floorKey]?.waters || [];
        });

        data.notice = apiData.notice || 'test';
        isLoading = false;

        // 更新 UI
        document.getElementById('storeButton').classList.add('enabled');
        document.getElementById('cafeButton').classList.add('enabled');
        document.getElementById('log_text').innerText = '商家数据已更新 饮品数据已更新';
        document.getElementById('adContentText').innerText = data.notice;
    }


    // 处理数据加载错误
    function handleDataError(error) {
        console.error('获取数据时出错:', error);
        isLoading = false;
        document.getElementById('storeButton').classList.add('enabled');
        document.getElementById('cafeButton').classList.add('enabled');
        document.getElementById('log_text').innerText = '获取数据时出错: ' + error.message;
        document.getElementById('adContentText').innerText = '';
    }

    // 页面加载时调用
    window.onload = async () => {
        try {
            const apiData = await fetchData();
            updateDataAndUI(apiData);
        } catch (error) {
            handleDataError(error);
        }
    };

    // 楼层选择处理
    function handleFloorSelect(value) {
        selectedFloor = value;
    }

    // 通用随机选择函数
    function getRandomItem(items, loadingMessage) {
        if (isLoading) return loadingMessage;
        if (items.length === 0) return "数据加载中...";
        return items[Math.floor(Math.random() * items.length)];
    }

    // 随机选择店家
    function selectRandomStore() {
        const floors = selectedFloor === 'random' ? ['2', '3'] : [selectedFloor];
        const floor = floors[Math.floor(Math.random() * floors.length)];
        const result = getRandomItem(data[floor].stores, "商家数据加载中...");
        document.getElementById("selectionResult").innerText = "您选择了: " + result;
    }

    // 随机选择饮品
    function selectWater() {
        const floors = selectedFloor === 'random' ? ['2', '3'] : [selectedFloor];
        const floor = floors[Math.floor(Math.random() * floors.length)];
        const result = getRandomItem(data[floor].waters, "饮品数据加载中...");
        document.getElementById("selectionResult").innerText = "您选择了: " + result;
    }
    function settings() {
        if (document.getElementsByClassName("settings-container")[0].style.display === "none") {
            document.getElementsByClassName("settings-container")[0].style.display = "block";
        } else {
            document.getElementsByClassName("settings-container")[0].style.display = "none";
        }
    }
</script>
</body>
</html>
